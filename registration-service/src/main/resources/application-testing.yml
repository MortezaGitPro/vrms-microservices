spring:
  datasource:
    url: jdbc:h2:mem:registration-test-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 0

services:
  cars:
    base-url: http://localhost:9991
  owners:
    base-url: http://localhost:9992
  agents:
    base-url: http://localhost:9993